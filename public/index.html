<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vimeo Bulk Editor | Data Governance</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>ACCN | Vimeo Bulk Editor</h1>
        <div data-netlify-identity-button></div>
    </header>

    <main id="app-container" style="display: none;">
        <div id="controls-container">
            <div class="controls-left">
                <div id="folder-selection">
                    <label for="folder-filter">Select a Folder:</label>
                    <select id="folder-filter"><option value="" disabled selected>Loading folders...</option></select>
                </div>
                <input type="text" id="search-input" placeholder="Search videos...">
                <button id="clear-filters-btn" class="btn-secondary" style="display: none;">Clear Filters</button>
            </div>
            
            <div class="controls-right">
                <div class="column-toggle-wrapper">
                    <button id="toggle-columns-btn" class="btn-secondary">Columns ⚙️</button>
                    <div id="column-toggle-panel" class="dropdown-panel" style="display:none;"></div>
                </div>
                <button id="save-all-btn" style="display: none;">Save All Changes</button>
            </div>
        </div>

        <div id="bulk-edit-bar" style="display: none;">
            <div class="bulk-edit-header"><span id="selection-counter"></span></div>
            <div class="bulk-edit-fields">
                <div class="field-group">
                    <label>Event Type</label>
                    <select id="bulk-event-type">
                        <option value="">-- No Change --</option>
                        <option value="Worship Service">Worship Service</option>
                        <option value="Inspiration Hour">Inspiration Hour</option>
                        <option value="Special Program">Special Program</option>
                    </select>
                </div>
                <div class="field-group">
                    <label>Series</label>
                    <input type="text" id="bulk-series" placeholder="e.g. Foundations Of Faith">
                </div>
                <div class="field-group"><label>Minister</label><input type="text" id="bulk-minister" placeholder="e.g. Brother David"></div>
                <div class="field-group"><label>Location</label><input type="text" id="bulk-location" placeholder="e.g. Mansfield, Ohio"></div>
                <div class="field-group">
                    <label>Audience</label>
                    <select id="bulk-audience">
                        <option value="">-- No Change --</option>
                        <option value="General">General</option>
                        <option value="Youth">Youth</option>
                        <option value="Teen">Teen</option>
                    </select>
                </div>
                <div class="field-group">
                    <label>Privacy</label>
                    <select id="bulk-privacy">
                        <option value="">-- No Change --</option>
                        <option value="anybody">Public (Anybody)</option>
                        <option value="unlisted">Unlisted</option>
                        <option value="password">Password</option>
                        <option value="nobody">Private (Nobody)</option>
                    </select>
                </div>
            </div>
            <div class="bulk-actions">
                <button id="apply-bulk-edit-btn">Apply Metadata</button>
                <button id="download-captions-btn">Download Captions</button>
            </div>
        </div>

        <div id="table-container" style="display: none;">
            <table id="video-table">
                <thead>
                    <tr>
                        <th class="col-Checkbox"><input type="checkbox" id="select-all-checkbox"></th>
                        <th class="col-Media"><span class="sort-label" data-sort="NativeTitle">Video Details</span></th>
                        <th class="col-Summary"><span class="sort-label" data-sort="Summary">Summary</span></th>
                        <th class="col-Title"><div class="th-content"><span class="sort-label" data-sort="Title">Title</span> <button class="filter-btn" data-key="Title">▼</button></div></th>
                        <th class="col-Series"><div class="th-content"><span class="sort-label" data-sort="Series">Series</span> <button class="filter-btn" data-key="Series">▼</button></div></th>
                        <th class="col-Date"><div class="th-content"><span class="sort-label" data-sort="Date">Date</span> <button class="filter-btn" data-key="Date">▼</button></div></th>
                        <th class="col-Minister"><div class="th-content"><span class="sort-label" data-sort="Minister">Minister</span> <button class="filter-btn" data-key="Minister">▼</button></div></th>
                        <th class="col-Scripture"><div class="th-content"><span class="sort-label" data-sort="Scripture">Scripture</span> <button class="filter-btn" data-key="Scripture">▼</button></div></th>
                        <th class="col-SupportingScripture"><div class="th-content"><span class="sort-label" data-sort="Supporting Scripture">Supporting Scripture</span> <button class="filter-btn" data-key="Supporting Scripture">▼</button></div></th>
                        <th class="col-EventType"><div class="th-content"><span class="sort-label" data-sort="Event Type">Event Type</span> <button class="filter-btn" data-key="Event Type">▼</button></div></th>
                        <th class="col-Topic"><div class="th-content"><span class="sort-label" data-sort="Topic">Topic</span> <button class="filter-btn" data-key="Topic">▼</button></div></th>
                        <th class="col-Features"><div class="th-content"><span class="sort-label" data-sort="Features">Features</span> <button class="filter-btn" data-key="Features">▼</button></div></th>
                        <th class="col-Holiday"><div class="th-content"><span class="sort-label" data-sort="Holiday">Holiday</span> <button class="filter-btn" data-key="Holiday">▼</button></div></th>
                        <th class="col-Location"><div class="th-content"><span class="sort-label" data-sort="Location">Location</span> <button class="filter-btn" data-key="Location">▼</button></div></th>
                        <th class="col-Audience"><div class="th-content"><span class="sort-label" data-sort="Audience">Audience</span> <button class="filter-btn" data-key="Audience">▼</button></div></th>
                    </tr>
                </thead>
                <tbody id="video-list"></tbody>
            </table>
        </div>
    </main>

    <div id="table-filter-panel" style="display: none;">
        <div class="filter-panel-header">
            <span id="filter-panel-title">Filter</span>
        </div>
        <div class="filter-panel-body" id="filter-panel-options"></div>
        <div class="filter-panel-footer">
            <button id="filter-panel-clear" class="btn-secondary">Clear</button>
            <button id="filter-panel-apply" class="btn-primary">Apply</button>
        </div>
    </div>

    <script type="text/javascript" src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="app.js"></script>
</body>
</html>
